<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Clinic Management System - Select Role</title>
    <link rel="icon" href="assets/images/logo/logo.png" type="image/png" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="js/util.js" defer></script>
    <script src="js/render.js" defer></script>
    <script src="js/components/header.js" defer></script>
    <script src="js/components/footer.js" defer></script>
</head>
<body>
<div class="container">
    <div id="header">
    </div>
    <main class="main-content">
        <div class="container">
            <div class="wrapper">
                <h2>Select Your <span>Role</span></h2>
                <button id="adminLoginBtn" onclick="selectRole('admin');" class="role-button">Admin</button>
                <button id="patientLoginBtn" onclick="selectRole('patient');" class="role-button">Patient</button>
                <button id="doctorLoginBtn" onclick="selectRole('doctor');" class="role-button">Doctor</button>
            </div>
        </div>
    </main>
    <div id="footer">
    </div>
</div>
<div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <div id="modal-body">
            <!-- Dynamic modal content will be inserted here -->
        </div>
    </div>

</div>
<script type="module" src="js/services/index.js"></script>
</body>
</html>
